name: AI Governance — Reusable Core

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: number
      repo_name:
        required: true
        type: string
      repo_owner:
        required: true
        type: string
    secrets:
      governance_token:
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write

jobs:
  # ─────────────────────────────────────────────
  # PHASE 1 — DETECTION (confidence scoring)
  # ─────────────────────────────────────────────
  detect:
    name: Detect AI Authorship
    runs-on: ubuntu-latest
    outputs:
      score: ${{ steps.score.outputs.score }}
      is_ai: ${{ steps.score.outputs.is_ai }}
      signal1: ${{ steps.signal1.outputs.detected }}
      signal2: ${{ steps.signal2.outputs.detected }}
      signal3: ${{ steps.signal3.outputs.detected }}
      signals_summary: ${{ steps.score.outputs.signals_summary }}

    steps:
      - name: Fetch PR commits
        id: fetch_commits
        env:
          GH_TOKEN: ${{ secrets.governance_token }}
        run: |
          curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ inputs.repo_owner }}/${{ inputs.repo_name }}/pulls/${{ inputs.pr_number }}/commits?per_page=100" \
            > /tmp/commits.json

          echo "Total commits fetched: $(jq length /tmp/commits.json)"

      # Signal 1 — Known AI agent signatures in commit messages
      - name: Signal 1 — Commit message signatures
        id: signal1
        run: |
          SIGNATURES=(
            "co-authored-by: cursoragent"
            "co-authored-by: cursor"
            "co-authored-by: claude"
            "co-authored-by: kiro"
            "co-authored-by: copilot"
            "co-authored-by: github-copilot"
            "co-authored-by: github-actions\[bot\]"
            "co-authored-by: dependabot"
            "co-authored-by: renovate"
            "generated by cursor"
            "generated by claude"
            "generated by copilot"
            "ai-generated"
            "auto-generated by"
            "co-authored-by: cursor-noreply"
            "co-authored-by: cursorai"
            "cursor agent"
            "cursor:agent"
            "co-authored-by: anthropic"
            "co-authored-by: claude-ai"
            "co-authored-by: claude[bot]"
            "generated by anthropic"
            "co-authored-by: copilot[bot]"
            "co-authored-by: github-copilot[bot]"
            "co-authored-by: copilot-swe-agent"
            "suggested by copilot"
            "co-authored-by: openai"
            "co-authored-by: chatgpt"
            "co-authored-by: codex"
            "generated by chatgpt"
            "generated by openai"
            "generated by gpt"
            "co-authored-by: amazon-q"
            "co-authored-by: amazonq"
            "co-authored-by: aws-codewhisperer"
            "co-authored-by: codewhisperer"
            "co-authored-by: aider"
            "co-authored-by: sweep"
            "co-authored-by: sweep-ai"
            "co-authored-by: devin"
            "co-authored-by: autofix"
            "co-authored-by: coderabbit"
            "ai assisted"
            "llm generated"
            "generated with ai"
            "written by ai"
            "🤖 generated"
            "co-authored-by: semantic-release-bot"
            "co-authored-by: allcontributors"
            "co-authored-by: imgbot"
            "co-authored-by: snyk-bot"
            "co-authored-by: whitesource-bolt"
          )

          MESSAGES=$(jq -r '.[].commit.message | ascii_downcase' /tmp/commits.json)
          DETECTED=false

          for sig in "${SIGNATURES[@]}"; do
            if echo "$MESSAGES" | grep -qiE "$sig"; then
              echo "Signal 1 matched: $sig"
              DETECTED=true
              break
            fi
          done

          echo "detected=$DETECTED" >> $GITHUB_OUTPUT
          if [ "$DETECTED" = "true" ]; then
            echo "SIGNAL1_POINTS=3" >> $GITHUB_ENV
            echo "SIGNAL1_LABEL=Commit message signature found (+3)" >> $GITHUB_ENV
          else
            echo "SIGNAL1_POINTS=0" >> $GITHUB_ENV
            echo "SIGNAL1_LABEL=No commit message signature" >> $GITHUB_ENV
          fi

      # Signal 2 — Committer vs Author identity mismatch
      - name: Signal 2 — Committer/Author mismatch
        id: signal2
        run: |
          MISMATCH_COUNT=$(jq '
            [.[] | 
              select(
                .commit.author.email != .commit.committer.email and
                .commit.committer.email != "noreply@github.com" and
                (.commit.committer.name | ascii_downcase | test("github|bot|action|cursor|claude|copilot|kiro"))
              )
            ] | length
          ' /tmp/commits.json)

          echo "Committer/Author mismatch count: $MISMATCH_COUNT"

          if [ "$MISMATCH_COUNT" -gt "0" ]; then
            echo "detected=true" >> $GITHUB_OUTPUT
            echo "SIGNAL2_POINTS=3" >> $GITHUB_ENV
            echo "SIGNAL2_LABEL=Committer/Author mismatch detected — $MISMATCH_COUNT commit(s) (+3)" >> $GITHUB_ENV
          else
            echo "detected=false" >> $GITHUB_OUTPUT
            echo "SIGNAL2_POINTS=0" >> $GITHUB_ENV
            echo "SIGNAL2_LABEL=No committer/author mismatch" >> $GITHUB_ENV
          fi

      # Signal 3 — Commit velocity anomaly (10+ files in <60s across commits)
      - name: Signal 3 — Commit velocity anomaly
        id: signal3
        env:
          GH_TOKEN: ${{ secrets.governance_token }}
        run: |
          COMMIT_COUNT=$(jq length /tmp/commits.json)
          ANOMALY=false

          if [ "$COMMIT_COUNT" -ge "2" ]; then
            # Extract timestamps and check for rapid succession
            jq -r '.[].commit.author.date' /tmp/commits.json | sort > /tmp/timestamps.txt

            FIRST=$(head -1 /tmp/timestamps.txt)
            LAST=$(tail -1 /tmp/timestamps.txt)

            FIRST_TS=$(date -d "$FIRST" +%s 2>/dev/null || date -jf "%Y-%m-%dT%H:%M:%SZ" "$FIRST" +%s)
            LAST_TS=$(date -d "$LAST" +%s 2>/dev/null || date -jf "%Y-%m-%dT%H:%M:%SZ" "$LAST" +%s)

            DURATION=$(( LAST_TS - FIRST_TS ))
            echo "Time span across commits: ${DURATION}s"

            # Fetch PR file count
            FILE_COUNT=$(curl -s \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ inputs.repo_owner }}/${{ inputs.repo_name }}/pulls/${{ inputs.pr_number }}/files?per_page=100" \
              | jq length)

            echo "Files changed in PR: $FILE_COUNT"

            if [ "$DURATION" -le "60" ] && [ "$FILE_COUNT" -ge "10" ]; then
              ANOMALY=true
              echo "Velocity anomaly: $FILE_COUNT files in ${DURATION}s across $COMMIT_COUNT commits"
            fi
          fi

          if [ "$ANOMALY" = "true" ]; then
            echo "detected=true" >> $GITHUB_OUTPUT
            echo "SIGNAL3_POINTS=2" >> $GITHUB_ENV
            echo "SIGNAL3_LABEL=Commit velocity anomaly detected (+2)" >> $GITHUB_ENV
          else
            echo "detected=false" >> $GITHUB_OUTPUT
            echo "SIGNAL3_POINTS=0" >> $GITHUB_ENV
            echo "SIGNAL3_LABEL=No velocity anomaly" >> $GITHUB_ENV
          fi

      # Calculate final score
      - name: Calculate confidence score
        id: score
        run: |
          TOTAL=$(( SIGNAL1_POINTS + SIGNAL2_POINTS + SIGNAL3_POINTS ))
          echo "Final confidence score: $TOTAL"

          IS_AI=false
          if [ "$TOTAL" -ge "3" ]; then
            IS_AI=true
          fi

          echo "score=$TOTAL" >> $GITHUB_OUTPUT
          echo "is_ai=$IS_AI" >> $GITHUB_OUTPUT

          SUMMARY="- $SIGNAL1_LABEL%0A- $SIGNAL2_LABEL%0A- $SIGNAL3_LABEL"
          echo "signals_summary=$SUMMARY" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────
  # PHASE 2 — ROUTING (tag, assign, audit comment)
  # ─────────────────────────────────────────────
  route:
    name: Tag, Route & Audit
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.is_ai == 'true'
    outputs:
      reviewer: ${{ steps.assign.outputs.reviewer }}

    steps:
      - name: Checkout governance repo for config
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repo_owner }}/.github
          token: ${{ secrets.governance_token }}
          path: governance-repo

      - name: Apply ai-authored label
        env:
          GH_TOKEN: ${{ secrets.governance_token }}
        run: |
          # Create label if it doesn't exist
          curl -s -o /dev/null \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ inputs.repo_owner }}/${{ inputs.repo_name }}/labels" \
            -d '{"name":"ai-authored","color":"e11d48","description":"This PR contains AI-authored commits"}' || true

          curl -s \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ inputs.repo_owner }}/${{ inputs.repo_name }}/issues/${{ inputs.pr_number }}/labels" \
            -d '{"labels":["ai-authored"]}'

          echo "Label ai-authored applied."

      - name: Resolve reviewer — CODEOWNERS first, repo-owners.yml fallback
        id: assign
        env:
          GH_TOKEN: ${{ secrets.governance_token }}
        run: |
          REPO="${{ inputs.repo_name }}"
          REPO_OWNER="${{ inputs.repo_owner }}"
          PR_NUMBER="${{ inputs.pr_number }}"
          REVIEWERS=""

          # ── Step 1: Fetch changed files in this PR ──
          curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO_OWNER/$REPO/pulls/$PR_NUMBER/files?per_page=100" \
            | jq -r '.[].filename' > /tmp/pr_files.txt

          echo "Changed files:"
          cat /tmp/pr_files.txt

          # ── Step 2: Try to fetch CODEOWNERS from the target repo ──
          # GitHub looks for CODEOWNERS in root, docs/, or .github/
          CODEOWNERS_CONTENT=""
          for path in "CODEOWNERS" ".github/CODEOWNERS" "docs/CODEOWNERS"; do
            HTTP_STATUS=$(curl -s -o /tmp/codeowners_response.txt -w "%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github.raw+json" \
              "https://api.github.com/repos/$REPO_OWNER/$REPO/contents/$path")
            if [ "$HTTP_STATUS" = "200" ]; then
              CODEOWNERS_CONTENT=$(cat /tmp/codeowners_response.txt)
              echo "CODEOWNERS found at: $path (HTTP $HTTP_STATUS)"
              break
            else
              echo "CODEOWNERS not found at: $path (HTTP $HTTP_STATUS)"
            fi
          done

          # ── Step 3: Parse CODEOWNERS and match changed files ──
          if [ -n "$CODEOWNERS_CONTENT" ]; then
            echo "$CODEOWNERS_CONTENT" > /tmp/CODEOWNERS

            REVIEWERS=$(python3 -c "
          import re, sys

          with open('/tmp/CODEOWNERS') as f:
              codeowners = f.read()

          with open('/tmp/pr_files.txt') as f:
              changed_files = [line.strip() for line in f if line.strip()]

          owners = set()
          rules = []

          for line in codeowners.splitlines():
              line = line.strip()
              if not line or line.startswith('#'):
                  continue
              parts = line.split()
              if len(parts) >= 2:
                  pattern = parts[0]
                  file_owners = [o.lstrip('@') for o in parts[1:] if not o.startswith('#')]
                  rules.append((pattern, file_owners))

          # Match each changed file against CODEOWNERS rules (last match wins)
          for changed_file in changed_files:
              matched_owners = []
              for pattern, file_owners in rules:
                  # Simple glob matching: exact, prefix, wildcard
                  pat = pattern.lstrip('/')
                  if pat == '*' or changed_file == pat or changed_file.startswith(pat.rstrip('*')):
                      matched_owners = file_owners
              owners.update(matched_owners)

          # Exclude bots and teams (teams can't be assigned as PR reviewers directly)
          individual_owners = [o for o in owners if '/' not in o]
          print(','.join(individual_owners[:3]))  # max 3 reviewers
          ")

            echo "Reviewers from CODEOWNERS: $REVIEWERS"
          fi

          # ── Step 4: Fallback to repo-owners.yml if CODEOWNERS gave nothing ──
          if [ -z "$REVIEWERS" ]; then
            echo "CODEOWNERS returned no reviewers. Falling back to repo-owners.yml..."
            if [ -f "governance-repo/governance/repo-owners.yml" ]; then
              REVIEWERS=$(python3 -c "
          import yaml
          with open('governance-repo/governance/repo-owners.yml') as f:
              config = yaml.safe_load(f)
          repos = config.get('repos', {})
          reviewer = repos.get('$REPO', '')
          print(reviewer.lstrip('@') if reviewer else '')
          ")
            fi
            echo "Reviewer from repo-owners.yml: $REVIEWERS"
          fi

          if [ -z "$REVIEWERS" ]; then
            echo "No reviewer found from any source. Skipping assignment."
          fi

          echo "reviewer=$REVIEWERS" >> $GITHUB_OUTPUT

      - name: Assign human reviewer(s)
        if: steps.assign.outputs.reviewer != ''
        env:
          GH_TOKEN: ${{ secrets.governance_token }}
          REVIEWERS_RAW: ${{ steps.assign.outputs.reviewer }}
        run: |
          # Build a JSON array from comma-separated reviewer list
          REVIEWERS_JSON=$(python3 -c "
          import json, os
          raw = os.environ.get('REVIEWERS_RAW', '')
          reviewers = [r.strip() for r in raw.split(',') if r.strip()]
          print(json.dumps(reviewers))
          ")

          curl -s \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ inputs.repo_owner }}/${{ inputs.repo_name }}/pulls/${{ inputs.pr_number }}/requested_reviewers" \
            -d "{\"reviewers\":$REVIEWERS_JSON}"

          echo "Reviewers assigned: $REVIEWERS_RAW"

      - name: Post structured audit comment
        env:
          GH_TOKEN: ${{ secrets.governance_token }}
          SCORE: ${{ needs.detect.outputs.score }}
          SIGNAL1: ${{ needs.detect.outputs.signal1 }}
          SIGNAL2: ${{ needs.detect.outputs.signal2 }}
          SIGNAL3: ${{ needs.detect.outputs.signal3 }}
          REVIEWER: ${{ steps.assign.outputs.reviewer }}
        run: |
          # Skip if audit comment already exists (prevents duplicates on re-runs/review events)
          EXISTING=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ inputs.repo_owner }}/${{ inputs.repo_name }}/issues/${{ inputs.pr_number }}/comments?per_page=100" \
            | jq '[.[] | select(.body | contains("AI-Authored PR Detected"))] | length')
          if [ "$EXISTING" -gt "0" ]; then
            echo "Audit comment already exists. Skipping duplicate."
            exit 0
          fi

          S1_ICON=$([ "$SIGNAL1" = "true" ] && echo "✅" || echo "❌")
          S2_ICON=$([ "$SIGNAL2" = "true" ] && echo "✅" || echo "❌")
          S3_ICON=$([ "$SIGNAL3" = "true" ] && echo "✅" || echo "❌")
          if [ -n "$REVIEWER" ]; then
            FORMATTED=$(echo "$REVIEWER" | tr ',' '\n' | sed 's/^ *//' | sed 's/^/@/' | tr '\n' ' ')
            REVIEWER_LINE="Assigned to: $FORMATTED"
          else
            REVIEWER_LINE="No reviewer found — please assign manually."
          fi

          BODY=$(cat <<EOF
          ## 🤖 AI-Authored PR Detected

          | Signal | Result |
          |--------|--------|
          | $S1_ICON Commit message signature | $([ "$SIGNAL1" = "true" ] && echo "Found" || echo "Not found") |
          | $S2_ICON Committer/Author mismatch | $([ "$SIGNAL2" = "true" ] && echo "Detected" || echo "Not detected") |
          | $S3_ICON Commit velocity anomaly | $([ "$SIGNAL3" = "true" ] && echo "Detected" || echo "Not detected") |

          **Confidence score: $SCORE / 8**

          This PR requires human review and verified approval before merge.

          $REVIEWER_LINE
          EOF
          )

          curl -s \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ inputs.repo_owner }}/${{ inputs.repo_name }}/issues/${{ inputs.pr_number }}/comments" \
            -d "$(jq -n --arg body "$BODY" '{body: $body}')"

  # ─────────────────────────────────────────────
  # PHASE 3 — FILE SCAN (prohibited pattern check)
  # ─────────────────────────────────────────────
  file-scan:
    name: Prohibited File Pattern Check
    runs-on: ubuntu-latest
    needs: [detect, route]
    if: needs.detect.outputs.is_ai == 'true'
    outputs:
      sensitive_files_found: ${{ steps.scan.outputs.sensitive_found }}
      matched_files: ${{ steps.scan.outputs.matched_files }}

    steps:
      - name: Checkout governance repo for blocklist
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repo_owner }}/.github
          token: ${{ secrets.governance_token }}
          path: governance-repo

      - name: Fetch changed files in PR
        env:
          GH_TOKEN: ${{ secrets.governance_token }}
        run: |
          curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ inputs.repo_owner }}/${{ inputs.repo_name }}/pulls/${{ inputs.pr_number }}/files?per_page=100" \
            | jq -r '.[].filename' > /tmp/changed_files.txt

          echo "Changed files:"
          cat /tmp/changed_files.txt

      - name: Check files against blocklist
        id: scan
        run: |
          BLOCKLIST="governance-repo/governance/blocklist.txt"
          MATCHED=()

          while IFS= read -r CHANGED_FILE; do
            while IFS= read -r PATTERN; do
              [[ -z "$PATTERN" || "$PATTERN" == \#* ]] && continue
              # Use glob-style matching
              if [[ "$CHANGED_FILE" == $PATTERN ]] || \
                 [[ "$(basename "$CHANGED_FILE")" == $PATTERN ]] || \
                 echo "$CHANGED_FILE" | grep -qE "$(echo "$PATTERN" | sed 's/\*/.*/g')"; then
                MATCHED+=("$CHANGED_FILE (matched: $PATTERN)")
                break
              fi
            done < "$BLOCKLIST"
          done < /tmp/changed_files.txt

          if [ ${#MATCHED[@]} -gt 0 ]; then
            echo "sensitive_found=true" >> $GITHUB_OUTPUT
            MATCHED_STR=$(printf '%s\n' "${MATCHED[@]}" | jq -R -s '.')
            echo "matched_files=$MATCHED_STR" >> $GITHUB_OUTPUT
            echo "Sensitive files detected:"
            printf '%s\n' "${MATCHED[@]}"
          else
            echo "sensitive_found=false" >> $GITHUB_OUTPUT
            echo "matched_files=" >> $GITHUB_OUTPUT
            echo "No sensitive files detected."
          fi

      - name: Apply needs-security-review label and post warning
        if: steps.scan.outputs.sensitive_found == 'true'
        env:
          GH_TOKEN: ${{ secrets.governance_token }}
          MATCHED: ${{ steps.scan.outputs.matched_files }}
        run: |
          # Create label if it doesn't exist
          curl -s -o /dev/null \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ inputs.repo_owner }}/${{ inputs.repo_name }}/labels" \
            -d '{"name":"needs-security-review","color":"f97316","description":"Sensitive files touched — security team review required"}' || true

          curl -s \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ inputs.repo_owner }}/${{ inputs.repo_name }}/issues/${{ inputs.pr_number }}/labels" \
            -d '{"labels":["needs-security-review"]}'

          BODY=$(cat <<EOF
          ## ⚠️ Sensitive Files Detected

          This AI-authored PR has touched the following sensitive files:

          \`\`\`
          $MATCHED
          \`\`\`

          **Security team review is mandatory before this PR can be merged.**

          Assigned to: @security-team

          > This check was triggered by the AI Governance workflow. Merge is blocked until the security team approves.
          EOF
          )

          curl -s \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ inputs.repo_owner }}/${{ inputs.repo_name }}/issues/${{ inputs.pr_number }}/comments" \
            -d "$(jq -n --arg body "$BODY" '{body: $body}')"

      - name: Block merge — sensitive files found
        if: steps.scan.outputs.sensitive_found == 'true'
        run: |
          echo "::error::Sensitive files detected in this AI-authored PR. Security team review required before merge."
          exit 1

  # ─────────────────────────────────────────────
  # PHASE 4 — MERGE GATE (GPG/SSH signing check)
  # Fires on PR review approval events only
  # ─────────────────────────────────────────────
  merge-gate:
    name: GPG/SSH Signing Enforcement
    runs-on: ubuntu-latest
    needs: [detect, file-scan]
    if: |
      needs.detect.outputs.is_ai == 'true' &&
      needs.file-scan.outputs.sensitive_files_found == 'false' &&
      github.event.review.state == 'approved'

    steps:
      - name: Verify approver GPG/SSH signature
        env:
          GH_TOKEN: ${{ secrets.governance_token }}
          APPROVER: ${{ github.event.review.user.login }}
        run: |
          echo "Checking GPG/SSH keys for approver: $APPROVER"

          GPG_KEY_COUNT=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/users/$APPROVER/gpg_keys" \
            | jq length)

          # /users/:user/keys = SSH authentication keys
          SSH_AUTH_KEY_COUNT=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/users/$APPROVER/keys" \
            | jq length)

          # /users/:user/ssh_signing_keys = SSH signing keys (added by GitHub in 2022)
          SSH_SIGNING_KEY_COUNT=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/users/$APPROVER/ssh_signing_keys" \
            | jq length)

          SSH_KEY_COUNT=$(( SSH_AUTH_KEY_COUNT + SSH_SIGNING_KEY_COUNT ))

          echo "GPG keys: $GPG_KEY_COUNT | SSH auth keys: $SSH_AUTH_KEY_COUNT | SSH signing keys: $SSH_SIGNING_KEY_COUNT"
          echo "GPG_KEY_COUNT=$GPG_KEY_COUNT" >> $GITHUB_ENV
          echo "SSH_KEY_COUNT=$SSH_KEY_COUNT" >> $GITHUB_ENV

      - name: Block merge if no signing key found
        env:
          GH_TOKEN: ${{ secrets.governance_token }}
          APPROVER: ${{ github.event.review.user.login }}
        run: |
          if [ "$GPG_KEY_COUNT" -eq "0" ] && [ "$SSH_KEY_COUNT" -eq "0" ]; then
            BODY=$(cat <<EOF
          ## ❌ Merge Blocked — Signing Key Required

          @$APPROVER has approved this AI-authored PR, but no GPG or SSH signing key is registered on their GitHub account.

          **This AI-authored PR requires a verified approver signature before merge is permitted.**

          To resolve:
          1. Add a GPG key: GitHub Settings → SSH and GPG keys → New GPG key
          2. Or add an SSH signing key: GitHub Settings → SSH and GPG keys → New SSH key (select "Signing Key")
          3. Re-approve this PR after adding the key.

          > This check is enforced by the AI Governance workflow.
          EOF
            )

            curl -s \
              -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ inputs.repo_owner }}/${{ inputs.repo_name }}/issues/${{ inputs.pr_number }}/comments" \
              -d "$(jq -n --arg body "$BODY" '{body: $body}')"

            echo "::error::Approver @$APPROVER has no GPG or SSH signing key. Merge blocked."
            exit 1
          else
            echo "Signing key verified for @$APPROVER. Merge permitted."
          fi

      - name: Post merge approval audit log
        if: success()
        env:
          GH_TOKEN: ${{ secrets.governance_token }}
          APPROVER: ${{ github.event.review.user.login }}
          SCORE: ${{ needs.detect.outputs.score }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          BODY=$(cat <<EOF
          ## ✅ Merge Approved — Audit Log

          | Field | Value |
          |-------|-------|
          | Approved by | @$APPROVER |
          | Signing key verified | ✅ |
          | Confidence score | $SCORE / 8 |
          | Approval timestamp | $TIMESTAMP |
          | Workflow | AI Governance v1 |

          This AI-authored PR has passed all governance checks and is cleared for merge.
          EOF
          )

          curl -s \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ inputs.repo_owner }}/${{ inputs.repo_name }}/issues/${{ inputs.pr_number }}/comments" \
            -d "$(jq -n --arg body "$BODY" '{body: $body}')"
